<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
  <title>نظام إدارة بنوك الدم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/logo.jpg">
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <img src="img/logo.jpg" class="login-logo" alt="Nada">
      <div class="login-icon"><i class="fas fa-tint"></i></div>
      <h1>بنك الدم</h1>
      <p class="login-subtitle">نظام إدارة بنوك الدم</p>
      <div onkeypress="if(event.key==='Enter')doLogin()">
      <div class="form-group">
        <label for="loginUser" style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;text-align:right"><i class="fas fa-user"></i> اسم المستخدم</label>
        <input type="text" id="loginUser" class="form-control" placeholder="اسم المستخدم" autofocus>
      </div>
      <div class="form-group">
        <label for="loginPass" style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;text-align:right"><i class="fas fa-lock"></i> كلمة المرور</label>
        <input type="password" id="loginPass" class="form-control" placeholder="كلمة المرور" autocomplete="off">
      </div>
      <div id="loginError" class="login-error"></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()" id="loginBtn">دخول</button>
      </div>
      <div style="margin-top:16px;font-size:13px;color:#2e7d32;border-top:2px solid #2e7d32;padding-top:12px;font-weight:600"><i class="fas fa-code"></i> إعداد و برمجة محمد ندا 01068880999</div>
    </div>
  </div>

  <div id="appPage" class="app" style="display:none">
    <header class="header">
      <div class="header-right">
        <img src="img/logo.jpg" class="header-logo" alt="Nada">
        <span id="userBadge" style="font-size:13px;color:var(--text-light)"></span>
      </div>
      <div class="header-left">
        <span class="credit-text">إعداد و برمجة محمد ندا 01068880999</span>
        <span class="date-display" id="dateDisplay"></span>
        <button onclick="toggleDarkMode()" id="darkModeBtn" style="background:none;border:none;color:var(--text-light);cursor:pointer;font-size:16px;transition:color 0.3s" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
        <button class="btn-logout" onclick="doLogout()" style="background:none;border:none;color:var(--text-light);cursor:pointer;font-size:16px"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>
    <div class="content" id="mainContent"></div>
    <div class="app-footer"><i class="fas fa-code"></i> إعداد و برمجة محمد ندا 01068880999</div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>
</html>
