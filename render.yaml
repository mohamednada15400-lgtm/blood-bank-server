services:
  - type: web
    name: blood-bank-server
    runtime: node
    repo: https://github.com/mohamednada15400-lgtm/blood-bank-server
    plan: free
    region: frankfurt
    healthCheckPath: /health
    buildCommand: npm install
    startCommand: node --max-old-space-size=128 server.js
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: NODE_VERSION
        value: 20.11.0
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
