services:
  - type: web
    name: blood-bank-server
    runtime: node
    repo: https://github.com/mohamednada15400-lgtm/blood-bank-server
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
